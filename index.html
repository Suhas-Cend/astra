<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASTRA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET & VARIABLES ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080808;
      --surface:   #111111;
      --border:    #222222;
      --gold:      #c9a84c;
      --gold-dim:  #9e7d34;
      --text:      #f0ece6;
      --muted:     #888880;
      --nav-h:     4rem;
      --font-head: 'Cormorant Garamond', serif;
      --font-body: 'Raleway', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
    }

    img { display: block; max-width: 100%; }
    a   { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: var(--font-body); }

    /* ─── INTRO OVERLAY ──────────────────────────────────────────────── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #intro-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #intro-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #skip-btn {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 0.55rem 1.2rem;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background 0.2s;
    }
    #skip-btn:hover { background: rgba(255,255,255,0.22); }

    /* ─── TOP NAV ────────────────────────────────────────────────────── */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(8,8,8,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    /* Logo */
    #logo-link {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
    }
    #logo-img {
      height: 2.2rem;
      width: auto;
      object-fit: contain;
      transition: opacity 0.2s;
    }
    #logo-img:hover { opacity: 0.75; }

    /* Centre brand text */
    #brand-text {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-head);
      font-weight: 600;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      white-space: nowrap;
      pointer-events: none;
    }

    /* Cart */
    #cart-btn {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.9rem;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    #cart-btn:hover { border-color: var(--gold); color: var(--gold); }
    #cart-count {
      background: var(--gold);
      color: #000;
      font-size: 0.65rem;
      font-weight: 600;
      width: 1.2rem; height: 1.2rem;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── PAGE WRAPPER ───────────────────────────────────────────────── */
    #app {
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* show/hide pages */
    .page { display: none; }
    .page.active { display: block; }

    /* ─── HOME – HERO VIDEO ──────────────────────────────────────────── */
    #hero-section {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 85vh;
      overflow: hidden;
      background: #000;
    }
    #hero-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 60%, rgba(8,8,8,1));
      pointer-events: none;
    }

    /* ─── HOME – PRODUCTS GRID ───────────────────────────────────────── */
    #products-section {
      padding: 3rem 1rem 4rem;
      max-width: 72rem;
      margin: 0 auto;
    }

    .section-title {
      font-family: var(--font-head);
      font-weight: 300;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .section-rule {
      width: 3rem;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 2.5rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    @media (min-width: 640px)  { .products-grid { gap: 1.5rem; } }
    @media (min-width: 900px)  { .products-grid { grid-template-columns: repeat(4, 1fr); gap: 2rem; } }

    .product-card {
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .product-card:hover {
      transform: translateY(-4px);
      border-color: var(--gold-dim);
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }
    .product-card-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #1a1a1a;
    }
    .product-card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .product-card:hover .product-card-img-wrap img { transform: scale(1.05); }

    .product-card-info {
      padding: 0.9rem 1rem 1.1rem;
      text-align: center;
    }
    .product-card-name {
      font-family: var(--font-head);
      font-weight: 600;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }
    .product-card-tap {
      margin-top: 0.4rem;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* ─── PRODUCT DETAIL PAGE ────────────────────────────────────────── */
    #product-page {
      padding: 2.5rem 1rem 4rem;
      max-width: 64rem;
      margin: 0 auto;
    }

    .product-detail-inner {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    @media (min-width: 700px) {
      .product-detail-inner {
        flex-direction: row;
        align-items: flex-start;
        gap: 3rem;
      }
    }

    .product-detail-img-wrap {
      flex: 0 0 auto;
      width: 100%;
      max-width: 22rem;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
    }
    @media (min-width: 700px) {
      .product-detail-img-wrap {
        width: 42%;
        margin: 0;
      }
    }

    .product-detail-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-detail-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .product-detail-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.15;
    }

    .product-detail-divider {
      width: 2.5rem;
      height: 1px;
      background: var(--gold);
    }

    /* Summary box */
    .product-summary-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 2px;
      padding: 1.2rem 1.4rem;
      font-size: 0.88rem;
      line-height: 1.8;
      color: #ccc8c0;
      min-height: 9rem;
    }

    /* Add to cart btn */
    .add-cart-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--gold);
      color: #000;
      border: none;
      padding: 0.85rem 2rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background 0.2s, transform 0.15s;
      align-self: flex-start;
    }
    .add-cart-btn:hover { background: #e0bb62; transform: translateY(-1px); }
    .add-cart-btn:active { transform: translateY(0); }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }
    .back-link svg { transition: transform 0.2s; }
    .back-link:hover svg { transform: translateX(-3px); }

    /* ─── CART SIDEBAR ───────────────────────────────────────────────── */
    #cart-sidebar {
      position: fixed;
      top: 0; right: 0;
      width: min(22rem, 90vw);
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    #cart-sidebar.open { transform: translateX(0); }

    #cart-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    #cart-backdrop.open { opacity: 1; pointer-events: all; }

    .cart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.4rem;
      border-bottom: 1px solid var(--border);
    }
    .cart-header h2 {
      font-family: var(--font-head);
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .close-cart-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      line-height: 1;
      transition: color 0.2s;
    }
    .close-cart-btn:hover { color: var(--text); }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.4rem;
    }
    .cart-empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 3rem;
      letter-spacing: 0.06em;
    }

    .cart-item {
      display: flex;
      gap: 0.8rem;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item img {
      width: 3.5rem; height: 3.5rem;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name {
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .cart-item-remove {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.3rem;
      padding: 0;
      transition: color 0.2s;
    }
    .cart-item-remove:hover { color: #e55; }

    .cart-footer {
      padding: 1.2rem 1.4rem;
      border-top: 1px solid var(--border);
    }
    .contact-btn {
      width: 100%;
      background: var(--gold);
      color: #000;
      border: none;
      padding: 0.9rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .contact-btn:hover { background: #e0bb62; }

    /* ─── TOAST ──────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: var(--gold);
      color: #000;
      padding: 0.65rem 1.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 2px;
      z-index: 5000;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      white-space: nowrap;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─── FOOTER ─────────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
    }

    /* ─── SCROLL REVEAL ──────────────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════
       INTRO VIDEO OVERLAY
  ══════════════════════════════════════════════════════════ -->
  <div id="intro-overlay">
    <!--
      ★ REPLACE src below with your hosted intro video URL (example 1 / intro video)
      Example: src="https://yourdomain.com/intro.mp4"
    -->
    <video
      id="intro-video"
      src="https://files.catbox.moe/haxs66.mp4"
      autoplay
      muted
      playsinline
      preload="auto"
    ></video>
    <button id="skip-btn">Skip ›</button>
  </div>

  <!-- ══════════════════════════════════════════════════════
       TOP NAVIGATION BAR
  ══════════════════════════════════════════════════════════ -->
  <nav id="navbar">

    <!-- ── Logo top-left (example 2) ── -->
    <a id="logo-link" href="#" onclick="showPage('home'); return false;" aria-label="Go to home">
      <!--
        ★ REPLACE src with your hosted logo URL (example 2)
        Example: src="https://yourdomain.com/logo.png"
      -->
      <img
        id="logo-img"
        src="https://files.catbox.moe/mjbd9h.png"
        alt="Brand Logo"
      />
    </a>

    <!-- ── Centre brand name (example 3) ── -->
    <span id="brand-text">
      <!-- ★ REPLACE: type your brand / business name here -->
      GRANDEUR
    </span>

    <!-- ── Cart top-right ── -->
    <button id="cart-btn" onclick="openCart()" aria-label="Open cart">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Cart
      <span id="cart-count">0</span>
    </button>

  </nav>

  <!-- ══════════════════════════════════════════════════════
       MAIN APP (SPA – no redirects)
  ══════════════════════════════════════════════════════════ -->
  <div id="app">

    <!-- ════════════════════════════════════════
         HOME PAGE
    ════════════════════════════════════════════ -->
    <section id="page-home" class="page active">

      <!-- Hero / banner video (example 4) -->
      <div id="hero-section">
        <!--
          ★ REPLACE src with your hosted homepage banner video (example 4)
          Example: src="https://yourdomain.com/banner.mp4"
        -->
        <video
          id="hero-video"
          src="https://files.catbox.moe/pfnrvz.mp4"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
        ></video>
        <div class="hero-overlay"></div>
      </div>

      <!-- Products section (2×2 grid) -->
      <div id="products-section">
        <h2 class="section-title reveal">Collection</h2>
        <div class="section-rule reveal"></div>

        <div class="products-grid">

          <!-- ──────── Product 1 ──────── -->
          <div class="product-card reveal" onclick="showProduct(0)">
            <div class="product-card-img-wrap">
              <!--
                ★ REPLACE src with hosted product 1 image (example 5)
                Example: src="https://yourdomain.com/prod1.jpg"
              -->
              <img
                src="https://placehold.co/600x600/1a1a1a/c9a84c?text=Product+1"
                alt="Product 1"
                loading="lazy"
              />
            </div>
            <div class="product-card-info">
              <!-- ★ REPLACE with product 1 name (example 9) -->
              <div class="product-card-name">EXAMPLE 9</div>
              <div class="product-card-tap">View Details</div>
            </div>
          </div>

          <!-- ──────── Product 2 ──────── -->
          <div class="product-card reveal" onclick="showProduct(1)" style="transition-delay:0.08s">
            <div class="product-card-img-wrap">
              <!--
                ★ REPLACE src (example 6)
              -->
              <img
                src="https://placehold.co/600x600/1a1a1a/c9a84c?text=Product+2"
                alt="Product 2"
                loading="lazy"
              />
            </div>
            <div class="product-card-info">
              <!-- ★ REPLACE with product 2 name (example 10) -->
              <div class="product-card-name">EXAMPLE 10</div>
              <div class="product-card-tap">View Details</div>
            </div>
          </div>

          <!-- ──────── Product 3 ──────── -->
          <div class="product-card reveal" onclick="showProduct(2)" style="transition-delay:0.16s">
            <div class="product-card-img-wrap">
              <!--
                ★ REPLACE src (example 7)
              -->
              <img
                src="https://placehold.co/600x600/1a1a1a/c9a84c?text=Product+3"
                alt="Product 3"
                loading="lazy"
              />
            </div>
            <div class="product-card-info">
              <!-- ★ REPLACE with product 3 name (example 11) -->
              <div class="product-card-name">EXAMPLE 11</div>
              <div class="product-card-tap">View Details</div>
            </div>
          </div>

          <!-- ──────── Product 4 ──────── -->
          <div class="product-card reveal" onclick="showProduct(3)" style="transition-delay:0.24s">
            <div class="product-card-img-wrap">
              <!--
                ★ REPLACE src (example 8)
              -->
              <img
                src="https://placehold.co/600x600/1a1a1a/c9a84c?text=Product+4"
                alt="Product 4"
                loading="lazy"
              />
            </div>
            <div class="product-card-info">
              <!-- ★ REPLACE with product 4 name (example 12) -->
              <div class="product-card-name">EXAMPLE 12</div>
              <div class="product-card-tap">View Details</div>
            </div>
          </div>

        </div><!-- /.products-grid -->
      </div><!-- /#products-section -->

      <footer>&copy; 2025 — Please reach out for further details.</footer>
    </section><!-- /#page-home -->


    <!-- ════════════════════════════════════════
         PRODUCT DETAIL PAGE
    ════════════════════════════════════════════ -->
    <section id="page-product" class="page">
      <div id="product-page">

        <!-- Back link -->
        <a class="back-link" href="#" onclick="showPage('home'); return false;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back to Collection
        </a>

        <div class="product-detail-inner">

          <!-- Left: product image (populated by JS) -->
          <div class="product-detail-img-wrap">
            <img id="detail-img" src="" alt="Product" />
          </div>

          <!-- Right: info -->
          <div class="product-detail-info">
            <!-- Product name -->
            <h1 id="detail-name" class="product-detail-name"></h1>
            <div class="product-detail-divider"></div>

            <!-- Summary / description box (example 13–16) -->
            <div id="detail-summary" class="product-summary-box"></div>

            <!-- Add to Cart -->
            <button class="add-cart-btn" onclick="addToCart()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
              </svg>
              Add to Cart
            </button>
          </div>

        </div><!-- /.product-detail-inner -->
      </div><!-- /#product-page -->
    </section><!-- /#page-product -->

  </div><!-- /#app -->


  <!-- ══════════════════════════════════════════════════════
       CART SIDEBAR
  ══════════════════════════════════════════════════════════ -->
  <div id="cart-backdrop" onclick="closeCart()"></div>
  <div id="cart-sidebar">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-cart-btn" onclick="closeCart()" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cart-items-list">
      <p class="cart-empty">Your cart is empty.</p>
    </div>
    <div class="cart-footer">
      <button class="contact-btn">Contact</button>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast">Added to cart</div>


  <!-- ══════════════════════════════════════════════════════
       JAVASCRIPT
  ══════════════════════════════════════════════════════════ -->
  <script>
    /* ════════════════════════════════════════════════════════
       ★★★  PRODUCT DATA  –  edit ONLY the values below  ★★★
       ════════════════════════════════════════════════════════
       For each product replace:
         image   → your hosted image URL
         name    → product name (shown on card + detail page)
         summary → long product description for detail page
    ════════════════════════════════════════════════════════ */
    const products = [
      {
        id: 0,
        image:   "https://placehold.co/600x600/1a1a1a/c9a84c?text=Product+1", // ★ example 5
        name:    "EXAMPLE 9",    // ★ example 9
        summary: "EXAMPLE 13 – Price and details"  // ★ example 13
      },
      {
        id: 1,
        image:   "https://placehold.co/600x600/1a1a1a/c9a84c?text=Product+2", // ★ example 6
        name:    "EXAMPLE 10",   // ★ example 10
        summary: "EXAMPLE 14 – Price and details"  // ★ example 14
      },
      {
        id: 2,
        image:   "https://placehold.co/600x600/1a1a1a/c9a84c?text=Product+3", // ★ example 7
        name:    "EXAMPLE 11",   // ★ example 11
        summary: "EXAMPLE 15 – Price and details"  // ★ example 15
      },
      {
        id: 3,
        image:   "https://placehold.co/600x600/1a1a1a/c9a84c?text=Product+4", // ★ example 8
        name:    "EXAMPLE 12",   // ★ example 12
        summary: "EXAMPLE 16 – Price and details"  // ★ example 16
      }
    ];
    /* ════════════════════════════════════════════════════════
       END OF EDITABLE DATA
    ════════════════════════════════════════════════════════ */


    /* ─── STATE ─────────────────────────────────────────── */
    let cart           = [];
    let currentProduct = null;

    /* ─── INTRO VIDEO ───────────────────────────────────── */
    const introOverlay = document.getElementById('intro-overlay');
    const introVideo   = document.getElementById('intro-video');
    const skipBtn      = document.getElementById('skip-btn');

    function dismissIntro() {
      introOverlay.classList.add('hidden');
      // Start homepage banner video after intro finishes
      document.getElementById('hero-video').play().catch(() => {});
    }

    introVideo.addEventListener('ended', dismissIntro);
    skipBtn.addEventListener('click', dismissIntro);
    // Fallback if video can't load
    introVideo.addEventListener('error', () => setTimeout(dismissIntro, 1500));

    /* ─── SPA PAGE ROUTING ──────────────────────────────── */
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      if (name === 'home') initReveal();
    }

    function showProduct(id) {
      const p          = products[id];
      currentProduct   = p;
      document.getElementById('detail-img').src              = p.image;
      document.getElementById('detail-img').alt              = p.name;
      document.getElementById('detail-name').textContent     = p.name;
      document.getElementById('detail-summary').textContent  = p.summary;
      showPage('product');
    }

    /* ─── CART ──────────────────────────────────────────── */
    function openCart()  {
      document.getElementById('cart-sidebar').classList.add('open');
      document.getElementById('cart-backdrop').classList.add('open');
    }
    function closeCart() {
      document.getElementById('cart-sidebar').classList.remove('open');
      document.getElementById('cart-backdrop').classList.remove('open');
    }

    function addToCart() {
      if (!currentProduct) return;
      cart.push({ ...currentProduct });
      updateCartUI();
      showToast('Added to cart');
    }

    function removeFromCart(idx) {
      cart.splice(idx, 1);
      updateCartUI();
    }

    function updateCartUI() {
      document.getElementById('cart-count').textContent = cart.length;
      const list = document.getElementById('cart-items-list');
      if (cart.length === 0) {
        list.innerHTML = '<p class="cart-empty">Your cart is empty.</p>';
        return;
      }
      list.innerHTML = cart.map((item, i) => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" />
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <button class="cart-item-remove" onclick="removeFromCart(${i})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    /* ─── TOAST ─────────────────────────────────────────── */
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    /* ─── SCROLL REVEAL ─────────────────────────────────── */
    function initReveal() {
      const els = document.querySelectorAll('.reveal');
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            obs.unobserve(e.target);
          }
        });
      }, { threshold: 0.1 });
      els.forEach(el => obs.observe(el));
    }

    window.addEventListener('DOMContentLoaded', initReveal);
  </script>
</body>
</html>
